name: Convert and Release

on:
  push:
    tags: ["model-v*", "model-ft-v*"]
  workflow_dispatch:
    inputs:
      model:
        description: "Model to convert"
        type: choice
        options: [htdemucs, htdemucs_ft]
        default: htdemucs

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Determine model from tag or input
        id: model
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "model=${{ github.event.inputs.model }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF#refs/tags/}" == model-ft-* ]]; then
            echo "model=htdemucs_ft" >> "$GITHUB_OUTPUT"
          else
            echo "model=htdemucs" >> "$GITHUB_OUTPUT"
          fi

      - name: Install CPU-only PyTorch
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert model to ONNX
        run: python scripts/convert_htdemucs_to_onnx.py --model ${{ steps.model.outputs.model }}

      - name: Validate ONNX model
        run: python scripts/validate_onnx.py --model ${{ steps.model.outputs.model }}

      - name: Runtime contract (protobuf + ORT CPU session)
        run: python scripts/onnx_runtime_contract.py --model models/${{ steps.model.outputs.model }}.onnx --ort-session

      - name: Generate checksum
        run: |
          cd models
          sha256sum ${{ steps.model.outputs.model }}.onnx > ${{ steps.model.outputs.model }}.onnx.sha256
          echo "Checksum:"
          cat ${{ steps.model.outputs.model }}.onnx.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.model.outputs.model }}-onnx
          path: |
            models/${{ steps.model.outputs.model }}.onnx
            models/${{ steps.model.outputs.model }}.onnx.sha256

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            models/${{ steps.model.outputs.model }}.onnx
            models/${{ steps.model.outputs.model }}.onnx.sha256
          body: |
            ## ${{ steps.model.outputs.model }} ONNX Model

            Converted from the pretrained [Demucs ${{ steps.model.outputs.model }}](https://github.com/adefossez/demucs) PyTorch model.

            **Model spec:**
            - Input: `[1, 2, frame_count]` (stereo audio at 44.1 kHz)
            - Output: `[1, 4, 2, frame_count]` (drums, bass, other, vocals)
            - Format: ONNX opset 17, optimized by ONNX Runtime offline graph optimization

            **Verification:** SHA-256 checksum included in `${{ steps.model.outputs.model }}.onnx.sha256`.
            Validated against PyTorch reference output (MSE < 1e-4) and checked for OpenKara runtime metadata.
          generate_release_notes: true
