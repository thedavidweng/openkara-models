name: Runtime contract (official ORT)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/runtime-contract.yml

      - name: Install onnx + onnxruntime (no torch)
        run: |
          pip install "onnx>=1.14" "onnxruntime>=1.23,<2"

      - name: Domain gate self-test
        run: python scripts/onnx_runtime_contract.py --self-test

      - name: Behavior tests (contract + ensemble graph)
        run: python tests/test_conversion_pipeline.py

      - name: Syntax check scripts
        run: python -m compileall -q scripts
