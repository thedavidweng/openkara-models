name: Trigger catalog generation 3

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/trigger-generation-3.yml'

permissions:
  contents: write

jobs:
  trigger:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: fix/catalog-generation-3-compatibility
          fetch-depth: 0
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit --allow-empty -m 'chore: execute corrective catalog generation'
          git push origin HEAD:fix/catalog-generation-3-compatibility
