name: Quality gates (corpus + metrics)

on:
  pull_request:
    paths:
      - "quality/**"
      - "scripts/synthetic_fixtures.py"
      - "scripts/validate_corpus_manifest.py"
      - "scripts/run_quality_suite.py"
      - "scripts/validate_quality_report.py"
      - "scripts/run_runtime_quality_suite.py"
      - "scripts/validate_runtime_quality_report.py"
      - "scripts/enforce_quality_gates.py"
      - "scripts/generate_trend_report.py"
      - "quality/baselines.json"
      - "quality/budgets.json"
      - "tests/test_corpus_manifest.py"
      - "tests/test_quality_report.py"
      - "tests/test_runtime_quality_report.py"
      - "tests/test_quality_gates.py"
      - "tests/test_trend_report.py"
      - ".github/workflows/quality-gates.yml"
  push:
    branches: [main]
    paths:
      - "quality/**"
      - "scripts/synthetic_fixtures.py"
      - "scripts/validate_corpus_manifest.py"
      - "scripts/run_quality_suite.py"
      - "scripts/validate_quality_report.py"
      - "scripts/run_runtime_quality_suite.py"
      - "scripts/validate_runtime_quality_report.py"
      - "scripts/enforce_quality_gates.py"
      - "scripts/generate_trend_report.py"
      - "quality/baselines.json"
      - "quality/budgets.json"

jobs:
  validate-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install "pytest>=8.0" "jsonschema>=4.20" "numpy>=1.24"
      - name: Validate corpus manifest
        run: python scripts/validate_corpus_manifest.py
      - name: Corpus + quality + runtime quality + gate + trend tests
        run: python -m pytest tests/test_corpus_manifest.py tests/test_quality_report.py tests/test_runtime_quality_report.py tests/test_quality_gates.py tests/test_trend_report.py -q
      - name: Syntax check
        run: python -m compileall -q scripts/synthetic_fixtures.py scripts/validate_corpus_manifest.py scripts/run_quality_suite.py scripts/validate_quality_report.py scripts/run_runtime_quality_suite.py scripts/validate_runtime_quality_report.py scripts/enforce_quality_gates.py scripts/generate_trend_report.py
