name: Check Upstream Demucs Updates

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Load last-known upstream state
        id: state
        run: |
          # State is tracked in a committed file so it persists across runs.
          # Missing file = first run, fall back to the pinned minimum.
          if [ -f ".upstream-state.json" ]; then
            cat .upstream-state.json
            LAST_PYPI=$(python3 -c "import json; print(json.load(open('.upstream-state.json')).get('pypi',''))")
            LAST_HF_HTDemucs=$(python3 -c "import json; print(json.load(open('.upstream-state.json')).get('hf_htdemucs',''))")
            LAST_HF_FT=$(python3 -c "import json; print(json.load(open('.upstream-state.json')).get('hf_htdemucs_ft',''))")
          else
            LAST_PYPI=""
            LAST_HF_HTDemucs=""
            LAST_HF_FT=""
          fi
          {
            echo "last_pypi=$LAST_PYPI"
            echo "last_hf_htdemucs=$LAST_HF_HTDemucs"
            echo "last_hf_ft=$LAST_HF_FT"
          } >> "$GITHUB_OUTPUT"

      - name: Check PyPI for new Demucs version
        id: pypi
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/demucs/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest demucs on PyPI: $LATEST"

      - name: Check HuggingFace for model weight updates
        id: hf
        run: |
          # Check lastModified timestamp for both HF model repos.
          # Demucs loads weights from these repos; they can update independently of PyPI.
          HF_HTDemucs=$(curl -s "https://huggingface.co/api/models/adefossez/HTDemucs" | python3 -c "import sys,json; print(json.load(sys.stdin).get('lastModified','unknown'))")
          HF_FT=$(curl -s "https://huggingface.co/api/models/adefossez/HTDemucs-ft" | python3 -c "import sys,json; print(json.load(sys.stdin).get('lastModified','unknown'))")
          {
            echo "htdemucs=$HF_HTDemucs"
            echo "htdemucs_ft=$HF_FT"
          } >> "$GITHUB_OUTPUT"
          echo "HF HTDemucs lastModified: $HF_HTDemucs"
          echo "HF HTDemucs-ft lastModified: $HF_FT"

      - name: Determine what changed
        id: diff
        env:
          LAST_PYPI: ${{ steps.state.outputs.last_pypi }}
          LAST_HF_HTDemucs: ${{ steps.state.outputs.last_hf_htdemucs }}
          LAST_HF_FT: ${{ steps.state.outputs.last_hf_ft }}
          NEW_PYPI: ${{ steps.pypi.outputs.latest }}
          NEW_HF_HTDemucs: ${{ steps.hf.outputs.htdemucs }}
          NEW_HF_FT: ${{ steps.hf.outputs.htdemucs_ft }}
        run: |
          PYPI_CHANGED="false"
          HF_HTDemucs_CHANGED="false"
          HF_FT_CHANGED="false"

          if [ -n "$NEW_PYPI" ] && [ "$NEW_PYPI" != "$LAST_PYPI" ]; then
            PYPI_CHANGED="true"
            echo "PyPI changed: $LAST_PYPI → $NEW_PYPI"
          fi
          if [ -n "$NEW_HF_HTDemucs" ] && [ "$NEW_HF_HTDemucs" != "$LAST_HF_HTDemucs" ]; then
            HF_HTDemucs_CHANGED="true"
            echo "HF HTDemucs changed: $LAST_HF_HTDemucs → $NEW_HF_HTDemucs"
          fi
          if [ -n "$NEW_HF_FT" ] && [ "$NEW_HF_FT" != "$LAST_HF_FT" ]; then
            HF_FT_CHANGED="true"
            echo "HF HTDemucs-ft changed: $LAST_HF_FT → $NEW_HF_FT"
          fi

          ANY_CHANGED="false"
          if [ "$PYPI_CHANGED" = "true" ] || [ "$HF_HTDemucs_CHANGED" = "true" ] || [ "$HF_FT_CHANGED" = "true" ]; then
            ANY_CHANGED="true"
          fi

          {
            echo "pypi_changed=$PYPI_CHANGED"
            echo "hf_htdemucs_changed=$HF_HTDemucs_CHANGED"
            echo "hf_ft_changed=$HF_FT_CHANGED"
            echo "any_changed=$ANY_CHANGED"
          } >> "$GITHUB_OUTPUT"

      - name: Update upstream state file
        if: steps.diff.outputs.any_changed == 'true'
        env:
          NEW_PYPI: ${{ steps.pypi.outputs.latest }}
          NEW_HF_HTDemucs: ${{ steps.hf.outputs.htdemucs }}
          NEW_HF_FT: ${{ steps.hf.outputs.htdemucs_ft }}
        run: |
          python3 -c "
          import json
          state = {
              'pypi': '$NEW_PYPI',
              'hf_htdemucs': '$NEW_HF_HTDemucs',
              'hf_htdemucs_ft': '$NEW_HF_FT',
          }
          with open('.upstream-state.json', 'w') as f:
              json.dump(state, f, indent=2)
              f.write('\n')
          print('Wrote .upstream-state.json:')
          print(json.dumps(state, indent=2))
          "

      - name: Commit upstream state
        if: steps.diff.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-state.json
          git commit -m "chore: update upstream state (pypi=${{ steps.pypi.outputs.latest }})"
          git push

      - name: Create or update tracking issue
        if: steps.diff.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "upstream-update" --description "Upstream dependency or model weight update" --color "0075ca" --force

          # Check for existing open issue
          EXISTING=$(gh issue list --label "upstream-update" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt "0" ]; then
            echo "Open upstream-update issue already exists, skipping issue creation."
          else
            gh issue create \
              --title "Upstream Demucs update detected (${{ steps.pypi.outputs.latest }})" \
              --label "upstream-update" \
              --body "$(cat <<EOF
          An upstream [Demucs](https://github.com/adefossez/demucs) update was detected.

          | Source | Previous | Latest |
          |--------|----------|--------|
          | PyPI | ${{ steps.state.outputs.last_pypi || '(none)' }} | ${{ steps.pypi.outputs.latest }} |
          | HF: HTDemucs | ${{ steps.state.outputs.last_hf_htdemucs || '(none)' }} | ${{ steps.hf.outputs.htdemucs }} |
          | HF: HTDemucs-ft | ${{ steps.state.outputs.last_hf_ft || '(none)' }} | ${{ steps.hf.outputs.htdemucs_ft }} |

          ### Automated actions
          - [x] Upstream state committed to \`.upstream-state.json\`
          - [x] Draft conversion triggered for changed models (see workflow runs)

          ### Manual action items (before tagging a release)
          - [ ] Review [Demucs changelog](https://github.com/adefossez/demucs/releases)
          - [ ] Check draft conversion artifacts for numerical validation (MSE < 1e-4)
          - [ ] Update \`requirements.txt\` if PyPI version changed
          - [ ] Tag new releases (\`model-vX.Y.Z\` / \`model-ft-vX.Y.Z\`) once validation passes
          EOF
          )"
            echo "Issue created."
          fi

      - name: Trigger draft conversion for htdemucs
        if: steps.diff.outputs.pypi_changed == 'true' || steps.diff.outputs.hf_htdemucs_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering draft conversion workflow for htdemucs..."
          gh workflow run convert.yml \
            --ref main \
            -f model=htdemucs
          echo "Draft conversion triggered for htdemucs. Check Actions tab for progress."

      - name: Trigger draft conversion for htdemucs_ft
        if: steps.diff.outputs.pypi_changed == 'true' || steps.diff.outputs.hf_ft_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering draft conversion workflow for htdemucs_ft..."
          gh workflow run convert.yml \
            --ref main \
            -f model=htdemucs_ft
          echo "Draft conversion triggered for htdemucs_ft. Check Actions tab for progress."

      - name: Summary
        run: |
          echo "=== Upstream Check Summary ==="
          echo "PyPI: ${{ steps.pypi.outputs.latest }} (changed: ${{ steps.diff.outputs.pypi_changed }})"
          echo "HF HTDemucs: ${{ steps.hf.outputs.htdemucs }} (changed: ${{ steps.diff.outputs.hf_htdemucs_changed }})"
          echo "HF HTDemucs-ft: ${{ steps.hf.outputs.htdemucs_ft }} (changed: ${{ steps.diff.outputs.hf_ft_changed }})"
          if [ "${{ steps.diff.outputs.any_changed }}" = "true" ]; then
            echo "→ Upstream state updated and draft conversions triggered."
          else
            echo "→ No changes detected."
          fi
