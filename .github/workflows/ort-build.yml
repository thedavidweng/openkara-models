name: ORT source build (5 targets)

on:
  pull_request:
    paths:
      - "ort/**"
      - "scripts/build_runtime.py"
      - "scripts/verify_runtime_package.py"
      - "scripts/validate_source_lock.py"
      - "tests/test_source_lock.py"
      - ".github/workflows/ort-build.yml"
  push:
    branches: [main]
    paths:
      - "ort/**"
      - "scripts/build_runtime.py"
      - "scripts/verify_runtime_package.py"
      - "scripts/validate_source_lock.py"

jobs:
  validate-source-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install "pytest>=8.0"
      - name: Validate source lock
        run: python scripts/validate_source_lock.py
      - name: Source lock tests
        run: python -m pytest tests/test_source_lock.py -q
      - name: Syntax check build scripts
        run: python -m compileall -q scripts/build_runtime.py scripts/verify_runtime_package.py scripts/validate_source_lock.py

  build-aarch64-apple-darwin:
    needs: validate-source-lock
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install CMake
        run: brew install cmake || true
      - name: Build ORT for aarch64-apple-darwin
        run: python scripts/build_runtime.py --target aarch64-apple-darwin
      - name: Verify package
        run: python scripts/verify_runtime_package.py --all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ort-aarch64-apple-darwin
          path: ort/packages/onnxruntime-*-aarch64-apple-darwin.tar.gz
          retention-days: 14

  build-x86_64-apple-darwin:
    needs: validate-source-lock
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install CMake
        run: brew install cmake || true
      - name: Build ORT for x86_64-apple-darwin
        run: python scripts/build_runtime.py --target x86_64-apple-darwin
      - name: Verify package
        run: python scripts/verify_runtime_package.py --all
      - uses: actions/upload-artifact@b4f3331c6cc4dc1d4db5c6f6f3fe9e5c4e60d3 # v4
        with:
          name: ort-x86_64-apple-darwin
          path: ort/packages/onnxruntime-*-x86_64-apple-darwin.tar.gz
          retention-days: 14

  build-x86_64-unknown-linux-gnu:
    needs: validate-source-lock
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      - name: Build ORT for x86_64-unknown-linux-gnu
        run: python scripts/build_runtime.py --target x86_64-unknown-linux-gnu
      - name: Verify package
        run: python scripts/verify_runtime_package.py --all
      - uses: actions/upload-artifact@b4f3331c6cc4dc1d4db5c6f6f3fe9e5c4e60d3 # v4
        with:
          name: ort-x86_64-unknown-linux-gnu
          path: ort/packages/onnxruntime-*-x86_64-unknown-linux-gnu.tar.gz
          retention-days: 14

  build-aarch64-unknown-linux-gnu:
    needs: validate-source-lock
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      - name: Build ORT for aarch64-unknown-linux-gnu
        run: python scripts/build_runtime.py --target aarch64-unknown-linux-gnu
      - name: Verify package
        run: python scripts/verify_runtime_package.py --all
      - uses: actions/upload-artifact@b4f3331c6cc4dc1d4db5c6f6f3fe9e5c4e60d3 # v4
        with:
          name: ort-aarch64-unknown-linux-gnu
          path: ort/packages/onnxruntime-*-aarch64-unknown-linux-gnu.tar.gz
          retention-days: 14

  build-x86_64-pc-windows-msvc:
    needs: validate-source-lock
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install CMake
        run: choco install cmake -y --installargs 'ADD_CMAKE_TO_PATH=System'
      - name: Build ORT for x86_64-pc-windows-msvc
        run: python scripts/build_runtime.py --target x86_64-pc-windows-msvc
      - name: Verify package
        run: python scripts/verify_runtime_package.py --all
      - uses: actions/upload-artifact@b4f3331c6cc4dc1d4db5c6f6f3fe9e5c4e60d3 # v4
        with:
          name: ort-x86_64-pc-windows-msvc
          path: ort/packages/onnxruntime-*-x86_64-pc-windows-msvc.zip
          retention-days: 14
