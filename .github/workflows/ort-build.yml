name: ORT source build (5 targets)

on:
  pull_request:
    paths:
      - "ort/**"
      - "scripts/build_runtime.py"
      - "scripts/verify_runtime_package.py"
      - "scripts/validate_source_lock.py"
      - "scripts/generate_required_operators.py"
      - "scripts/compare_runtime_builds.py"
      - "scripts/generate_runtime_supply_chain.py"
      - "scripts/run_runtime_benchmarks.py"
      - "scripts/validate_benchmark_report.py"
      - "scripts/generate_runtime_catalog_entries.py"
      - "scripts/archive_utils.py"
      - "scripts/ort_api_version.py"
      - "scripts/run_native_smoke.py"
      - "tests/test_source_lock.py"
      - "tests/test_required_operators.py"
      - "tests/test_compare_runtime_builds.py"
      - "tests/test_runtime_supply_chain.py"
      - "tests/test_benchmark_report.py"
      - "tests/test_runtime_catalog_entries.py"
      - "tests/test_archive_utils.py"
      - "tests/test_ort_api_version.py"
      - "tests/test_native_smoke.py"
      - ".github/workflows/ort-build.yml"
  push:
    branches: [main]
    paths:
      - "ort/**"
      - "scripts/build_runtime.py"
      - "scripts/verify_runtime_package.py"
      - "scripts/validate_source_lock.py"
      - "scripts/generate_required_operators.py"
      - "scripts/compare_runtime_builds.py"
      - "scripts/generate_runtime_supply_chain.py"
      - "scripts/run_runtime_benchmarks.py"
      - "scripts/validate_benchmark_report.py"
      - "scripts/generate_runtime_catalog_entries.py"
      - "scripts/archive_utils.py"
      - "scripts/ort_api_version.py"
      - "scripts/run_native_smoke.py"

jobs:
  validate-source-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install "pytest>=8.0" "onnx>=1.22.0" "jsonschema>=4.20"
      - name: Validate source lock
        run: python scripts/validate_source_lock.py
      - name: Source lock + required-operator + comparison + supply-chain + benchmark + catalog-entry + archive + api-version + smoke tests
        run: |
          python -m pytest tests/test_source_lock.py tests/test_required_operators.py tests/test_compare_runtime_builds.py tests/test_runtime_supply_chain.py tests/test_benchmark_report.py tests/test_runtime_catalog_entries.py tests/test_archive_utils.py tests/test_ort_api_version.py tests/test_native_smoke.py -q
      - name: Syntax check build scripts
        run: python -m compileall -q scripts/build_runtime.py scripts/verify_runtime_package.py scripts/validate_source_lock.py scripts/generate_required_operators.py scripts/compare_runtime_builds.py scripts/generate_runtime_supply_chain.py scripts/run_runtime_benchmarks.py scripts/validate_benchmark_report.py scripts/generate_runtime_catalog_entries.py scripts/archive_utils.py scripts/ort_api_version.py scripts/run_native_smoke.py scripts/run_runtime_quality_suite.py

  build-aarch64-apple-darwin:
    needs: validate-source-lock
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Build ORT for aarch64-apple-darwin
        run: python scripts/build_runtime.py --target aarch64-apple-darwin
      - name: Generate supply-chain records (SBOM + provenance)
        run: python scripts/generate_runtime_supply_chain.py --all
      - name: Verify package (incl. supply-chain)
        run: python scripts/verify_runtime_package.py --all
      - name: Download stable model from catalog
        run: |
          python - <<'PY'
          import json, urllib.request, pathlib, hashlib
          m = json.load(open("catalog/releases/2026-07-20-001.json"))
          model = next(a for a in m["artifacts"]["models"]
                       if a["artifact_id"] == "htdemucs.balanced.fp32.onnx")
          dest = pathlib.Path("models/htdemucs.onnx")
          dest.parent.mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(model["download_url"], dest)
          got = hashlib.sha256(dest.read_bytes()).hexdigest()
          assert got == model["archive_digest"], f"sha256 mismatch {got} != {model['archive_digest']}"
          print("model downloaded + verified")
          PY
      - name: Run native smoke harness (CPU + CoreML)
        run: |
          RUNTIME=$(ls ort/packages/onnxruntime-*-aarch64-apple-darwin.tar.gz | grep -v reduced)
          for PROV in cpu coreml; do
            python scripts/run_native_smoke.py \
              --runtime "$RUNTIME" \
              --model models/htdemucs.onnx \
              --target aarch64-apple-darwin \
              --provider "$PROV" \
              --ort-source ort/source \
              --report "smoke-aarch64-apple-darwin-${PROV}.json"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ort-aarch64-apple-darwin
          path: |
            ort/packages/onnxruntime-*-aarch64-apple-darwin.tar.gz
            smoke-aarch64-apple-darwin-*.json
          retention-days: 14

  build-x86_64-apple-darwin:
