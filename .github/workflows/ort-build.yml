          dest = pathlib.Path("models/htdemucs.onnx")
          dest.parent.mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(model["download_url"], dest)
          got = hashlib.sha256(dest.read_bytes()).hexdigest()
          assert got == model["archive_digest"], f"sha256 mismatch"
          print("model downloaded + verified")
          PY
      - name: Run native smoke harness (CPU + XNNPACK)
        run: |
          RUNTIME=$(ls ort/packages/onnxruntime-*-x86_64-apple-darwin.tar.gz | grep -v reduced)
          for PROV in cpu xnnpack; do
            python scripts/run_native_smoke.py \
              --runtime "$RUNTIME" \
              --model models/htdemucs.onnx \
              --target x86_64-apple-darwin \
              --provider "$PROV" \
              --ort-source ort/source \
              --report "smoke-x86_64-apple-darwin-${PROV}.json"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ort-x86_64-apple-darwin
          path: |
            ort/packages/onnxruntime-*-x86_64-apple-darwin.tar.gz
            smoke-x86_64-apple-darwin-*.json
          retention-days: 14

  build-x86_64-unknown-linux-gnu:
