name: Catalog schema & fixtures

on:
  pull_request:
    paths:
      - "catalog/**"
      - "latest.json"
      - "scripts/catalog_model.py"
      - "scripts/validate_catalog.py"
      - "scripts/generate_catalog_fixtures.py"
      - "scripts/generate_catalog_release.py"
      - "scripts/generate_supply_chain.py"
      - "scripts/verify_supply_chain.py"
      - "scripts/publish_catalog_release.py"
      - "tests/test_catalog_validation.py"
      - "tests/test_catalog_generator.py"
      - "tests/test_supply_chain.py"
      - "tests/test_publish_catalog.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/catalog-validate.yml"
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "latest.json"
      - "scripts/catalog_model.py"
      - "scripts/validate_catalog.py"
      - "scripts/generate_catalog_fixtures.py"
      - "scripts/generate_catalog_release.py"
      - "scripts/generate_supply_chain.py"
      - "scripts/verify_supply_chain.py"
      - "scripts/publish_catalog_release.py"
      - "tests/test_catalog_validation.py"
      - "tests/test_catalog_generator.py"
      - "tests/test_supply_chain.py"
      - "tests/test_publish_catalog.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            .github/workflows/catalog-validate.yml

      - name: Install validator deps (no torch)
        run: pip install "jsonschema>=4.20" "pytest>=8.0"

      - name: Validate all fixtures
        run: python scripts/validate_catalog.py --all-fixtures

      - name: Validate committed release manifests + pointer
        run: |
          for manifest in catalog/releases/*.json; do
            python scripts/validate_catalog.py "$manifest"
          done
          python scripts/validate_catalog.py --schema channel catalog/channels/stable.json

      - name: Verify supply-chain records
        run: python scripts/verify_supply_chain.py --all

      - name: Catalog unit + generator + supply-chain + publish tests
        run: python -m pytest tests/test_catalog_validation.py tests/test_catalog_generator.py tests/test_supply_chain.py tests/test_publish_catalog.py -q

      - name: Fixtures are fresh (regenerate + git diff)
        run: |
          python scripts/generate_catalog_fixtures.py
          git diff --exit-code -- catalog/fixtures

      - name: Supply-chain records are fresh (regenerate + git diff)
        run: |
          python scripts/generate_supply_chain.py --release 2026-07-20-001
          python scripts/generate_supply_chain.py --release 2026-07-23-001
          git diff --exit-code -- catalog/supply-chain catalog/specs

      - name: Generated catalog is fresh (regenerate + git diff)
        run: |
          for spec in catalog/specs/*.spec.json; do
            python scripts/generate_catalog_release.py --spec "$spec"
          done
          git diff --exit-code -- catalog/releases latest.json

      - name: Publication dry-run (verifies asset URLs + SHA-256)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/publish_catalog_release.py --release 2026-07-23-003

      - name: Syntax check catalog scripts
        run: python -m compileall -q scripts/catalog_model.py scripts/validate_catalog.py scripts/generate_catalog_fixtures.py scripts/generate_catalog_release.py scripts/generate_supply_chain.py scripts/verify_supply_chain.py scripts/publish_catalog_release.py
