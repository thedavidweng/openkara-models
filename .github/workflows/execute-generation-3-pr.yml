name: Execute catalog generation 3

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/execute-generation-3-pr.yml'

permissions:
  contents: write

jobs:
  execute:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: fix/catalog-generation-3-compatibility
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'
      - name: Execute embedded correction script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install pyyaml 'jsonschema>=4.20' 'pytest>=8.0'
          python - <<'PY'
          from pathlib import Path
          import yaml
          workflow = yaml.safe_load(Path('.github/workflows/one-shot-generation-3.yml').read_text())
          script = workflow['jobs']['correct']['steps'][-1]['run']
          script = script.replace('import json\n', 'import json\nimport os\n', 1)
          run_id_literal = "'run_id': '$" + "{{ github.run_id }}'"
          sha_literal = "'commit_sha': '$" + "{{ github.sha }}'"
          script = script.replace(run_id_literal, "'run_id': os.environ['GITHUB_RUN_ID']")
          script = script.replace(sha_literal, "'commit_sha': os.environ['GITHUB_SHA']")
          script = script.replace(
              'rm .github/workflows/one-shot-generation-3.yml',
              'rm .github/workflows/one-shot-generation-3.yml .github/workflows/execute-generation-3-pr.yml .github/generation3-failure.log',
          )
          Path('/tmp/generation-3.sh').write_text('set -euo pipefail\n' + script)
          PY
          set +e
          bash /tmp/generation-3.sh > /tmp/generation3.log 2>&1
          status=$?
          set -e
          cat /tmp/generation3.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/generation3.log .github/generation3-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .github/generation3-failure.log
            git commit -m 'chore: capture generation 3 failure'
            git push origin HEAD:fix/catalog-generation-3-compatibility
            exit "$status"
          fi
