version: 2
updates:
  # Python dependencies — owned by Dependabot.
  # Renovate and repository-owned scripts do NOT touch requirements.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      torch:
        patterns: ["torch", "torchaudio"]
      onnx:
        patterns: ["onnx", "onnxruntime"]

  # GitHub Actions — owned by Dependabot.
  # Renovate and repository-owned scripts do NOT touch workflow files.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
